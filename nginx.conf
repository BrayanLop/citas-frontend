server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: como las rutas las maneja React Router, cualquier path que no sea
    # un archivo real lo devolvemos a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mismo truco que el proxy de Vite en desarrollo: el front llama a /api/...
    # y nginx lo reenvía a la API. La barra final quita el prefijo /api,
    # así /api/Auth/login termina pegándole a http://api:8080/Auth/login.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
